services:
  screenshot:
    build: .
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      DATA_DIR: "/data"
      PUBLIC_APP_ORIGIN: "https://screenshot.example.com"
      PUBLIC_ASSET_ORIGIN: "https://assets.example.com"
      ID_LENGTH: "12"
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      OIDC_REDIRECT_URI: "https://screenshot.example.com/auth/callback"
      ADMIN_EMAIL: ""
      SESSION_SECRET: ""
      COOKIE_DOMAIN: ""
    volumes:
      - screenshot-data:/data

volumes:
  screenshot-data:
